# Cloud Build pipeline for VOLANS (旧 volume-check).
#
# Build:   gcloud builds submit --config cloudbuild.yaml
# Deploy:  the last step deploys to Cloud Run (region asia-northeast1).
#
# Overridable substitutions (defaults in the block below):
#   _SERVICE_NAME     Cloud Run service name       (default: volans-web)
#   _REGION           Cloud Run region             (default: asia-northeast1)
#   _IMAGE_REPO       Artifact Registry repo name  (default: volans)
#
# Secrets: GEMINI_API_KEY is injected from Secret Manager (`gemini-api-key`).
# See the `--set-secrets` line in the deploy step for how to provision it.

substitutions:
  _SERVICE_NAME: volans-web
  _REGION: asia-northeast1
  _IMAGE_REPO: volans

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_IMAGE_REPO}/volans-web:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_IMAGE_REPO}/volans-web:latest

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    # Dockerfile uses `RUN --mount=type=cache,...` which requires BuildKit.
    # The default docker builder on this image is the legacy builder; enable
    # BuildKit via the env var so the cache mount works.
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_IMAGE_REPO}/volans-web:${SHORT_SHA}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_IMAGE_REPO}/volans-web:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_IMAGE_REPO}/volans-web

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_IMAGE_REPO}/volans-web:${SHORT_SHA}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --cpu=1
      - --memory=512Mi
      - --min-instances=0
      - --max-instances=3
      - --concurrency=80
      - --timeout=120s
      - --cpu-boost
      - --set-env-vars=NEXT_TELEMETRY_DISABLED=1,NODE_ENV=production
      # Inject the Gemini API key via Secret Manager. Create the secret once:
      #   echo -n "$GEMINI_API_KEY" | gcloud secrets create gemini-api-key --data-file=-
      # Then grant the Cloud Build SA `roles/secretmanager.secretAccessor`.
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest
      # Liveness/readiness probes default to TCP on --port. /api/health is
      # available for external uptime checks (Google Cloud Monitoring etc).
      - --labels=app=volans,tier=web
